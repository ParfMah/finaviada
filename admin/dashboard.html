  <link rel="icon" type="image/png" href="../assets/favicon.png">

<body class="admin-body" id="adminDashboard">

          <p class="admin-nav-section-title">Tableau de bord</p>
          <a href="#" class="admin-nav-link active" data-page="overview">

          <a href="#" class="admin-nav-link" data-page="images">

            Médiathèque
          </a>
        </div>

        <div class="admin-nav-section">
          <p class="admin-nav-section-title">Communication</p>
          <a href="#" class="admin-nav-link" data-page="emails">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

          </a>
        </div>

    <!-- =============================================
         CONTENU PRINCIPAL
         ============================================= -->
    <div class="admin-main">

      <!-- Topbar -->
      <header class="admin-topbar">
        <button class="admin-topbar-toggle" id="sidebarToggle" aria-label="Ouvrir le menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="admin-topbar-title" id="topbarTitle">Vue d'ensemble</h1>
        <div class="admin-topbar-actions">
          <a href="../index.html" target="_blank" class="admin-view-site">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Voir le site

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="admin-notif-dot"></span>
          </button>
        </div>
      </header>

      <!-- Zone de contenu dynamique -->
      <div class="admin-page-content" id="adminContent">
        <!-- Le contenu est injecté dynamiquement par admin.js -->
        <div style="display:flex;align-items:center;justify-content:center;min-height:300px;">
          <div class="spinner spinner-green" style="width:32px;height:32px;border-width:3px;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Configuration de l'API backend (à adapter selon l'environnement de déploiement)
    window.FINAVIA_API = window.FINAVIA_API || 'http://localhost:5000';
  </script>
  <script src="../js/admin.js"></script>

</html>
