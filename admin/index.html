<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Administration – FINAVIA</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="admin-body">

  <div class="admin-login-page">
    <div class="admin-login-card">

      <a href="../index.html" class="admin-login-logo">
        <img src="../assets/images/logo-full.webp" class="logo-full" alt="FINAVIA">
      </a>

      <span class="admin-login-badge">Espace Administrateur</span>

      <h1 class="admin-login-title">Connexion</h1>
      <p class="admin-login-subtitle">Accédez à votre tableau de bord pour gérer le contenu, les demandes et les services FINAVIA.</p>

      <!-- Message d'erreur -->
      <div class="alert alert-error" id="loginError" style="display:none;margin-bottom:1.25rem;">
        <span>⚠</span>
        <span id="loginErrorText">Email ou mot de passe incorrect.</span>
      </div>

      <form id="adminLoginForm" class="admin-login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="adminEmail">Adresse email</label>
          <input type="email" class="form-input" id="adminEmail" placeholder="admin@finavia.eu"
                 autocomplete="username" required>
        </div>

        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label" for="adminPassword">Mot de passe</label>
          <div style="position:relative;">
            <input type="password" class="form-input" id="adminPassword" placeholder="••••••••••"
                   autocomplete="current-password" required style="padding-right:3rem;">
            <button type="button" id="togglePassword" aria-label="Afficher le mot de passe"
                    style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--clr-text-muted);cursor:pointer;display:flex;align-items:center;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin:0.5rem 0;">
          <label class="form-check" style="margin:0;">
            <input type="checkbox" id="rememberMe">
            <span class="form-check-label">Se souvenir de moi</span>
          </label>
          <a href="#" style="font-size:0.8125rem;color:var(--clr-secondary);text-decoration:none;font-weight:600;">
            Mot de passe oublié ?
          </a>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%;margin-top:0.5rem;">
          Se connecter
        </button>
      </form>

      <div class="admin-login-footer">
        <a href="../index.html" class="admin-login-back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Retour au site FINAVIA
        </a>
      </div>
    </div>
  </div>

  <script>
    // Configuration de l'API backend (à adapter selon l'environnement)
    window.FINAVIA_API = window.FINAVIA_API || 'http://localhost:5000';
  </script>
  <script src="../js/admin.js"></script>
</body>
</html>
